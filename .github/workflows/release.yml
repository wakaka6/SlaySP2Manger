name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Frontend dependencies ─────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci --ignore-scripts

      # ── Extract Release Notes ─────────────────────────────────────────────
      - name: Extract Release Notes
        id: extract
        shell: bash
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
        run: |
          node -e "
            const fs = require('fs');
            const tag = process.env.TAG_NAME || '';
            const version = tag.startsWith('v') ? tag.slice(1) : tag;
            const lines = fs.readFileSync('CHANGELOG.md', 'utf8').split('\n');
            let capture = false;
            const notes = [];
            for (const line of lines) {
              if (line.trim().startsWith('## [')) {
                if (capture) break;
                if (line.includes('[' + version + ']')) {
                  capture = true;
                  continue;
                }
              }
              if (capture) notes.push(line);
            }
            const finalNotes = notes.join('\n').trim();
            const eof = 'EOF_' + Date.now();
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'NOTES<<' + eof + '\n' + finalNotes + '\n' + eof + '\n', 'utf8');
          "

      # ── Tauri build (creates MSI + .sig + GitHub Release) ──────────────────
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npx tauri
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'SlaySP2Manager ${{ inputs.tag || github.ref_name }}'
          releaseBody: |
            ## SlaySP2Manager ${{ inputs.tag || github.ref_name }}

            ### 安装方式 / How to Install

            下载 `.msi` 安装包，双击即可安装。支持自定义安装目录。
            Download the `.msi` installer and double-click to install. Custom install path supported.

            安装后应用将自动检查更新。
            The app will check for updates automatically after installation.

            ---

            ### 更新内容 / Release Notes

            ${{ steps.extract.outputs.NOTES }}

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target x86_64-pc-windows-msvc
