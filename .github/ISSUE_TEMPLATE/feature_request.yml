name: ✨ Feature Request | 新功能请求
description: Suggest a new idea or improvement | 提供一个新创意或改进建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出新功能建议！ | Thanks for suggesting a new feature!
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? | 你的功能请求是否与某个特定问题有关？
      description: A clear and concise description of what the problem is. | 请清晰、简要地描述该问题。
      placeholder: I am always frustrated when...
    validations:
      required: true
  - type: textarea
    id: feature
    attributes:
      label: Describe the feature you'd like | 描述你想要的功能
      description: A clear and concise description of what you want to happen. | 请清晰、简要地描述你想要实现的功能。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered | 描述你考虑过的替代方案
      description: A clear and concise description of any alternative solutions or features you've considered. | 请清晰、简要地描述你考虑过的任何替代方案。
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context | 更多背景
      description: Add any other context or screenshots about the feature request here. | 在此处添加关于功能请求的其他背景或截图。
